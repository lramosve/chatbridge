<!DOCTYPE html>
<html>
<head><title>GitHub Auth Callback</title></head>
<body style="font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;background:#0d1117;color:#e6edf3;">
  <div id="msg" style="text-align:center;">
    <p>Connecting to GitHub...</p>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const error = params.get('error');

    if (error) {
      document.getElementById('msg').innerHTML = '<p>Authorization denied.</p><p style="color:#8b949e;font-size:13px;">You can close this window.</p>';
    } else if (code) {
      if (window.opener) {
        window.opener.postMessage({ type: 'github-auth-code', code }, '*');
        document.getElementById('msg').innerHTML = '<p style="color:#238636;">Connected! Closing...</p>';
        setTimeout(() => window.close(), 1000);
      } else {
        document.getElementById('msg').innerHTML = '<p>Could not communicate with ChatBridge.</p><p style="color:#8b949e;font-size:13px;">Please close this window and try again.</p>';
      }
    } else {
      document.getElementById('msg').innerHTML = '<p>No authorization code received.</p>';
    }
  </script>
</body>
</html>
