<!DOCTYPE html>
<html>
<head><title>Google Classroom Auth Callback</title></head>
<body style="font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;background:#f8fafc;color:#1a1a2e;">
  <div id="msg" style="text-align:center;">
    <p>Connecting to Google Classroom...</p>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const error = params.get('error');

    if (error) {
      document.getElementById('msg').innerHTML = '<p>Authorization denied.</p><p style="color:#5f6368;font-size:13px;">You can close this window.</p>';
    } else if (code) {
      if (window.opener) {
        window.opener.postMessage({ type: 'google-auth-code', code }, '*');
        document.getElementById('msg').innerHTML = '<p style="color:#34a853;">Connected! Closing...</p>';
        setTimeout(() => window.close(), 1000);
      } else {
        document.getElementById('msg').innerHTML = '<p>Could not communicate with ChatBridge.</p>';
      }
    } else {
      document.getElementById('msg').innerHTML = '<p>No authorization code received.</p>';
    }
  </script>
</body>
</html>
