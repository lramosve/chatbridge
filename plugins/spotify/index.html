<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotify - ChatBridge Plugin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 16px;
      background: #121212;
      color: #fff;
    }
    .header { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
    .header .logo { font-size: 24px; }
    .header h2 { font-size: 18px; color: #1db954; }
    .auth-banner {
      background: #282828;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
      text-align: center;
    }
    .auth-banner.connected { border: 1px solid #1db954; }
    .auth-btn {
      background: #1db954;
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    .auth-btn:hover { background: #1ed760; }
    .auth-btn.disconnect { background: #b3b3b3; }
    .search-box {
      display: flex; gap: 8px; margin-bottom: 16px;
    }
    .search-box input {
      flex: 1; padding: 10px 16px; background: #282828;
      border: 1px solid #404040; border-radius: 20px;
      color: white; font-size: 14px; outline: none;
    }
    .search-box input:focus { border-color: #1db954; }
    .search-box button {
      padding: 10px 20px; background: #1db954; color: white;
      border: none; border-radius: 20px; cursor: pointer;
      font-size: 14px; font-weight: 600;
    }
    .track-list { display: flex; flex-direction: column; gap: 4px; }
    .track {
      display: flex; align-items: center; gap: 12px; padding: 8px;
      border-radius: 4px; cursor: pointer;
    }
    .track:hover { background: #282828; }
    .track.selected { background: #1a3a2a; }
    .track-art {
      width: 40px; height: 40px; border-radius: 4px;
      background: #404040; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; overflow: hidden;
    }
    .track-art img { width: 100%; height: 100%; object-fit: cover; }
    .track-info { flex: 1; min-width: 0; }
    .track-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track-artist { font-size: 12px; color: #b3b3b3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track-check { color: #1db954; font-size: 18px; }
    .actions {
      margin-top: 12px; display: flex; gap: 8px; align-items: center;
    }
    .selected-count { color: #b3b3b3; font-size: 13px; }
    .empty { text-align: center; color: #b3b3b3; padding: 32px; font-size: 14px; }
    .status-msg { font-size: 13px; color: #1db954; margin-top: 8px; text-align: center; }
    .status-msg.error { color: #ff4444; }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">🎵</span>
    <h2>Spotify Playlist Creator</h2>
  </div>

  <div class="auth-banner" id="authBanner">
    <p style="color: #b3b3b3; font-size: 13px; margin-bottom: 8px;">Connect your Spotify account to create playlists</p>
    <button class="auth-btn" id="authBtn" onclick="handleAuth()">Connect Spotify</button>
  </div>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search for songs..." onkeydown="if(event.key==='Enter')doSearch()">
    <button onclick="doSearch()">Search</button>
  </div>

  <div id="content">
    <div class="empty">Search for songs or ask the chatbot to find music for you.</div>
  </div>

  <div id="statusMsg" class="status-msg"></div>

  <script>
    // ── Spotify OAuth Config (PKCE) ──
    // In production, these come from environment. For the demo, they're configurable.
    const SPOTIFY_CLIENT_ID = ''; // Set via env or config
    const REDIRECT_URI = window.location.origin + '/plugins/spotify/callback.html';
    const SCOPES = 'playlist-modify-public playlist-modify-private';

    let seq = 0;
    let accessToken = null;
    let userProfile = null;
    let searchResults = [];
    let selectedTrackIds = new Set();
    const fetchPending = new Map();

    // ── ChatBridge Protocol ──
    function send(payload) {
      window.parent.postMessage({
        protocol: 'chatbridge',
        correlationId: payload.correlationId || crypto.randomUUID(),
        timestamp: new Date().toISOString(),
        seq: seq++,
        ...payload
      }, '*');
    }

    // Proxy fetch through the platform
    function bridgeFetch(url, options) {
      const correlationId = crypto.randomUUID();
      return new Promise((resolve, reject) => {
        const timeout = setTimeout(() => {
          fetchPending.delete(correlationId);
          reject(new Error('Fetch proxy timeout'));
        }, 15000);
        fetchPending.set(correlationId, {
          resolve: (val) => { clearTimeout(timeout); resolve(val); },
          reject: (err) => { clearTimeout(timeout); reject(err); }
        });
        send({ type: 'FETCH_REQUEST', pluginId: 'spotify', correlationId, url, options });
      });
    }

    window.addEventListener('message', async (event) => {
      const data = event.data;
      if (!data) return;

      // Handle fetch proxy responses
      if (data.protocol === 'chatbridge' && data.type === 'FETCH_RESPONSE') {
        const pending = fetchPending.get(data.correlationId);
        if (pending) {
          fetchPending.delete(data.correlationId);
          if (data.errorMessage) pending.reject(new Error(data.errorMessage));
          else pending.resolve({ ok: data.ok, status: data.status, data: data.data });
        }
        return;
      }

      // Handle OAuth callback message from popup
      if (data.type === 'spotify-auth-callback' && data.accessToken) {
        accessToken = data.accessToken;
        await loadProfile();
        updateAuthUI();
        send({
          type: 'STATE_UPDATE',
          pluginId: 'spotify',
          stateSummary: { authenticated: true, user: userProfile?.display_name },
          description: `Spotify connected as ${userProfile?.display_name || 'user'}`
        });
        return;
      }

      if (data.protocol !== 'chatbridge') return;

      if (data.type === 'TOOL_INVOKE') {
        try {
          let result;
          switch (data.toolName) {
            case 'search_tracks':
              result = await searchTracks(data.parameters.query);
              break;
            case 'create_playlist':
              result = await createPlaylist(data.parameters.name, data.parameters.trackIds);
              break;
            case 'get_auth_status':
              result = { authenticated: !!accessToken, user: userProfile?.display_name || null };
              break;
            default:
              throw new Error(`Unknown tool: ${data.toolName}`);
          }
          send({ type: 'TOOL_RESULT', correlationId: data.correlationId, status: 'success', data: result });
        } catch (err) {
          send({ type: 'TOOL_RESULT', correlationId: data.correlationId, status: 'error', data: null, errorMessage: err.message });
        }
      }

      if (data.type === 'RESTORE_STATE' && data.lastStateSummary) {
        if (data.lastStateSummary.searchResults) {
          searchResults = data.lastStateSummary.searchResults;
          renderTracks();
        }
      }
    });

    // ── OAuth Flow ──
    function handleAuth() {
      if (accessToken) {
        // Disconnect
        accessToken = null;
        userProfile = null;
        updateAuthUI();
        return;
      }

      if (!SPOTIFY_CLIENT_ID) {
        // Demo mode: simulate auth
        accessToken = 'demo-token';
        userProfile = { display_name: 'Demo User', id: 'demo' };
        updateAuthUI();
        showStatus('Connected in demo mode (no Spotify client ID configured)');
        send({
          type: 'STATE_UPDATE',
          pluginId: 'spotify',
          stateSummary: { authenticated: true, user: 'Demo User', demoMode: true },
          description: 'Spotify connected in demo mode'
        });
        return;
      }

      // Real PKCE flow
      const codeVerifier = generateCodeVerifier();
      sessionStorage.setItem('spotify_code_verifier', codeVerifier);

      generateCodeChallenge(codeVerifier).then(codeChallenge => {
        const params = new URLSearchParams({
          client_id: SPOTIFY_CLIENT_ID,
          response_type: 'code',
          redirect_uri: REDIRECT_URI,
          scope: SCOPES,
          code_challenge_method: 'S256',
          code_challenge: codeChallenge,
        });
        // Open popup for OAuth
        window.open(
          `https://accounts.spotify.com/authorize?${params}`,
          'spotify-auth',
          'width=500,height=700'
        );
      });
    }

    function generateCodeVerifier() {
      const arr = new Uint8Array(32);
      crypto.getRandomValues(arr);
      return btoa(String.fromCharCode(...arr)).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
    }

    async function generateCodeChallenge(verifier) {
      const data = new TextEncoder().encode(verifier);
      const digest = await crypto.subtle.digest('SHA-256', data);
      return btoa(String.fromCharCode(...new Uint8Array(digest))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
    }

    async function loadProfile() {
      if (!accessToken || accessToken === 'demo-token') return;
      try {
        const res = await bridgeFetch('https://api.spotify.com/v1/me', {
          headers: { Authorization: `Bearer ${accessToken}` }
        });
        userProfile = res.data;
      } catch (e) { console.warn('Failed to load profile:', e); }
    }

    function updateAuthUI() {
      const banner = document.getElementById('authBanner');
      const btn = document.getElementById('authBtn');
      if (accessToken) {
        banner.classList.add('connected');
        banner.querySelector('p').textContent = `Connected as ${userProfile?.display_name || 'Spotify User'}`;
        btn.textContent = 'Disconnect';
        btn.classList.add('disconnect');
      } else {
        banner.classList.remove('connected');
        banner.querySelector('p').textContent = 'Connect your Spotify account to create playlists';
        btn.textContent = 'Connect Spotify';
        btn.classList.remove('disconnect');
      }
    }

    // ── Spotify API ──
    async function searchTracks(query) {
      // Use Spotify search API if authenticated, otherwise use demo data
      if (accessToken && accessToken !== 'demo-token') {
        const res = await bridgeFetch(`https://api.spotify.com/v1/search?q=${encodeURIComponent(query)}&type=track&limit=10`, {
          headers: { Authorization: `Bearer ${accessToken}` }
        });
        if (!res.ok) throw new Error('Spotify search failed. Try reconnecting.');
        const data = res.data;
        searchResults = data.tracks.items.map(t => ({
          id: t.id,
          name: t.name,
          artist: t.artists.map(a => a.name).join(', '),
          album: t.album.name,
          albumArt: t.album.images?.[2]?.url || null,
          previewUrl: t.preview_url,
          uri: t.uri,
        }));
      } else {
        // Demo mode: generate plausible mock results
        searchResults = generateMockResults(query);
      }

      renderTracks();

      send({
        type: 'STATE_UPDATE',
        pluginId: 'spotify',
        stateSummary: { searchResults, query, selectedCount: selectedTrackIds.size },
        description: `Found ${searchResults.length} tracks for "${query}"`
      });

      return {
        query,
        tracks: searchResults,
        count: searchResults.length
      };
    }

    async function createPlaylist(name, trackIdsStr) {
      if (!accessToken) {
        return { error: 'AUTH_REQUIRED', message: 'Please connect your Spotify account first.' };
      }

      const trackIds = trackIdsStr.split(',').map(id => id.trim());

      if (accessToken === 'demo-token') {
        const result = {
          playlistName: name,
          trackCount: trackIds.length,
          message: `Playlist "${name}" created with ${trackIds.length} tracks (demo mode).`,
          demoMode: true,
        };
        showStatus(`Created playlist "${name}" with ${trackIds.length} tracks (demo)`);
        send({
          type: 'APP_COMPLETE',
          pluginId: 'spotify',
          resultSummary: result.message,
          data: result
        });
        return result;
      }

      // Real Spotify API
      const createRes = await bridgeFetch(`https://api.spotify.com/v1/users/${userProfile.id}/playlists`, {
        method: 'POST',
        headers: {
          Authorization: `Bearer ${accessToken}`,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ name, public: true }),
      });
      if (!createRes.ok) throw new Error('Failed to create playlist');
      const playlist = createRes.data;

      // Add tracks
      const uris = trackIds.map(id => `spotify:track:${id}`);
      await bridgeFetch(`https://api.spotify.com/v1/playlists/${playlist.id}/tracks`, {
        method: 'POST',
        headers: {
          Authorization: `Bearer ${accessToken}`,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ uris }),
      });

      const result = {
        playlistName: name,
        playlistUrl: playlist.external_urls.spotify,
        trackCount: trackIds.length,
        message: `Playlist "${name}" created with ${trackIds.length} tracks!`,
      };

      showStatus(`Created playlist "${name}"!`);
      send({
        type: 'APP_COMPLETE',
        pluginId: 'spotify',
        resultSummary: result.message,
        data: result
      });

      return result;
    }

    // ── Mock data for demo mode ──
    function generateMockResults(query) {
      const mockTracks = [
        { name: 'Bohemian Rhapsody', artist: 'Queen', album: 'A Night at the Opera' },
        { name: 'Stairway to Heaven', artist: 'Led Zeppelin', album: 'Led Zeppelin IV' },
        { name: 'Hotel California', artist: 'Eagles', album: 'Hotel California' },
        { name: 'Imagine', artist: 'John Lennon', album: 'Imagine' },
        { name: 'Smells Like Teen Spirit', artist: 'Nirvana', album: 'Nevermind' },
        { name: 'Yesterday', artist: 'The Beatles', album: 'Help!' },
        { name: 'Billie Jean', artist: 'Michael Jackson', album: 'Thriller' },
        { name: 'Purple Rain', artist: 'Prince', album: 'Purple Rain' },
        { name: 'Lose Yourself', artist: 'Eminem', album: '8 Mile' },
        { name: 'Rolling in the Deep', artist: 'Adele', album: '21' },
      ];

      // Filter by query (basic matching)
      const q = query.toLowerCase();
      let results = mockTracks.filter(t =>
        t.name.toLowerCase().includes(q) ||
        t.artist.toLowerCase().includes(q) ||
        t.album.toLowerCase().includes(q)
      );

      // If no match, return first 5
      if (results.length === 0) results = mockTracks.slice(0, 5);

      return results.map((t, i) => ({
        id: `mock-${i}-${Date.now()}`,
        name: t.name,
        artist: t.artist,
        album: t.album,
        albumArt: null,
        previewUrl: null,
        uri: `spotify:track:mock${i}`,
      }));
    }

    // ── UI Rendering ──
    function renderTracks() {
      const content = document.getElementById('content');
      if (searchResults.length === 0) {
        content.innerHTML = '<div class="empty">No tracks found.</div>';
        return;
      }

      content.innerHTML = `
        <div class="track-list">
          ${searchResults.map(t => `
            <div class="track ${selectedTrackIds.has(t.id) ? 'selected' : ''}" onclick="toggleTrack('${t.id}')">
              <div class="track-art">
                ${t.albumArt ? `<img src="${t.albumArt}" alt="">` : '🎵'}
              </div>
              <div class="track-info">
                <div class="track-name">${t.name}</div>
                <div class="track-artist">${t.artist} · ${t.album}</div>
              </div>
              <div class="track-check">${selectedTrackIds.has(t.id) ? '✓' : ''}</div>
            </div>
          `).join('')}
        </div>
        <div class="actions">
          <span class="selected-count">${selectedTrackIds.size} selected</span>
          ${selectedTrackIds.size > 0 ? '<button class="auth-btn" onclick="promptPlaylist()">Create Playlist</button>' : ''}
        </div>
      `;
    }

    function toggleTrack(id) {
      if (selectedTrackIds.has(id)) {
        selectedTrackIds.delete(id);
      } else {
        selectedTrackIds.add(id);
      }
      renderTracks();
    }

    function promptPlaylist() {
      const name = prompt('Playlist name:', 'My ChatBridge Playlist');
      if (name) {
        createPlaylist(name, [...selectedTrackIds].join(','));
      }
    }

    function doSearch() {
      const query = document.getElementById('searchInput').value.trim();
      if (query) searchTracks(query);
    }

    function showStatus(msg, isError = false) {
      const el = document.getElementById('statusMsg');
      el.textContent = msg;
      el.className = `status-msg ${isError ? 'error' : ''}`;
      setTimeout(() => { el.textContent = ''; }, 5000);
    }

    // ── Init ──
    send({ type: 'APP_READY', pluginId: 'spotify' });
  </script>
</body>
</html>
